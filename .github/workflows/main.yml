name: Sync Fork

on:
  schedule:
    # 每天凌晨 0 点（UTC 时间）自动运行一次
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许你在网页上点击按钮手动触发同步

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4

      - name: Sync upstream
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4.1
        with:
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          # 填入原作者的 GitHub 用户名/项目名 (例如: facebook/react)
          upstream_repository: 原作者用户名/项目名
          # 填入原项目和你自己项目正在使用的分支名（通常是 main 或 master）
          target_branch: main
          upstream_branch: main
          # 如果有冲突，是强行覆盖(true)还是报错(false)
          force: false
