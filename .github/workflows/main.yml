name: Sync Fork

on:
  schedule:
    # 每天凌晨 0 点（UTC 时间）自动运行一次
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许你随时在网页上点击按钮手动触发同步

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repo
        # 升级到了官方最新的 v4 版本，兼容最新环境
        uses: actions/checkout@v4

      - name: Sync upstream
        # 核心修改：将原本的 v3.4.1 升级到最新的 v3.4.5（支持最新的 Node 运行环境）
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4.5
        with:
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          upstream_sync_repo: xianxie6/build-industry-knowledge-system
          target_sync_branch: main
          upstream_sync_branch: main
          upstream_pull_args: --rebase
